<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Poke Dojo{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css?v=20260630b" />
  <link rel="icon" type="image/png" href="/static/favicon.png?v=20260628" />
  {% if supabase_configured %}
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const _supabaseClient = window.supabase.createClient(
      "{{ supabase_url }}",
      "{{ supabase_anon_key }}"
    );
  </script>
  {% endif %}
</head>
<body>
  <header class="navbar">
    <a href="/" class="logo"><img src="/static/logo.png" alt="Poke Dojo" class="logo-sprite">Poke Dojo</a>
    <nav>
      <a href="/play" id="nav-play">Play</a>
      <a href="/daily-challenge" id="nav-daily">Daily</a>
      <div class="nav-dropdown" id="nav-lb-wrap">
        <button class="nav-dropdown-trigger" id="nav-lb-btn">Leaderboard ▾</button>
        <div class="nav-dropdown-menu hidden" id="nav-lb-menu">
          <a href="/leaderboard">Dojo</a>
          <a href="/arena-leaderboard">Arena</a>
        </div>
      </div>
      <a href="/profile" id="nav-profile">My Profile</a>
      <a href="/journey" id="nav-journey">Trainer Journey</a>
      <div class="nav-dropdown" id="nav-help-wrap">
        <button class="nav-dropdown-trigger" id="nav-help-btn">Help ▾</button>
        <div class="nav-dropdown-menu hidden" id="nav-help-menu">
          <a href="/faq">FAQ</a>
          <a href="/contact">Contact Us</a>
        </div>
      </div>
      <span id="nav-user" class="nav-user"></span>
      <span id="nav-streak" class="nav-streak hidden"></span>
    </nav>
    <button id="hamburger-btn" class="hamburger-btn" aria-label="Menu">&#9776;</button>
    <div id="mobile-nav-menu" class="mobile-nav-menu hidden">
      <a href="/play" class="mobile-nav-link">Play</a>
      <a href="/daily-challenge" class="mobile-nav-link">Daily Challenge</a>
      <div class="mobile-nav-group">
        <div class="mobile-nav-group-label">Leaderboard</div>
        <a href="/leaderboard" class="mobile-nav-sublink">Dojo</a>
        <a href="/arena-leaderboard" class="mobile-nav-sublink">Arena</a>
      </div>
      <a href="/profile" class="mobile-nav-link">My Profile</a>
      <a href="/journey" class="mobile-nav-link">Trainer Journey</a>
      <div class="mobile-nav-group">
        <div class="mobile-nav-group-label">Help</div>
        <a href="/faq" class="mobile-nav-sublink">FAQ</a>
        <a href="/contact" class="mobile-nav-sublink">Contact Us</a>
      </div>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script>
    const _navUser = localStorage.getItem("poke_username");
    if (_navUser) document.getElementById("nav-user").textContent = _navUser;

    function toggleLbMenu() {
      document.getElementById("nav-lb-menu").classList.toggle("hidden");
    }
    document.getElementById("nav-lb-btn").addEventListener("click", e => {
      e.stopPropagation();
      toggleLbMenu();
    });
    document.getElementById("nav-help-btn").addEventListener("click", e => {
      e.stopPropagation();
      document.getElementById("nav-help-menu").classList.toggle("hidden");
    });
    document.addEventListener("click", () => {
      document.querySelectorAll(".nav-dropdown-menu").forEach(m => m.classList.add("hidden"));
      document.getElementById("mobile-nav-menu").classList.add("hidden");
    });

    document.getElementById("hamburger-btn").addEventListener("click", e => {
      e.stopPropagation();
      document.getElementById("mobile-nav-menu").classList.toggle("hidden");
    });
    document.getElementById("mobile-nav-menu").addEventListener("click", e => {
      if (e.target.tagName === "A") document.getElementById("mobile-nav-menu").classList.add("hidden");
    });

    async function _loadStreak(username) {
      try {
        const res = await fetch(`/daily/streak?username=${encodeURIComponent(username)}`);
        const data = await res.json();
        const streak = data.current_streak || 0;
        if (streak >= 1) {
          const id = streak >= 30 ? 609 : streak >= 7 ? 608 : 607;
          const el = document.getElementById("nav-streak");
          el.innerHTML =
            `<img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png">` +
            `<span>${streak}</span>`;
          el.classList.remove("hidden");
        }
      } catch (_) {}
    }

    {% if supabase_configured %}
    // Keep nav username in sync with Google session
    (async () => {
      try {
        const { data: { session } } = await _supabaseClient.auth.getSession();
        if (!session) return;
        const resp = await fetch("/auth/verify", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ access_token: session.access_token }),
        });
        if (!resp.ok) return;
        const info = await resp.json();
        if (info.authenticated && info.username) {
          localStorage.setItem("poke_username", info.username);
          document.getElementById("nav-user").textContent = "🌐 " + info.username;
          _loadStreak(info.username);
        } else if (info.authenticated && !info.username) {
          if (!window.location.pathname.startsWith("/auth/")) {
            window.location.href = "/auth/claim";
          }
        }
      } catch (_) {}
    })();
    {% endif %}
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
