<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Poke-Dojo{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>
  <header class="navbar">
    <a href="/" class="logo"><img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/107.png" alt="" class="logo-sprite">Poke-Dojo</a>
    <nav>
      <a href="/play" id="nav-play">Play</a>
      <div class="nav-dropdown" id="nav-lb-wrap">
        <button class="nav-dropdown-trigger" id="nav-lb-btn">Leaderboard ▾</button>
        <div class="nav-dropdown-menu hidden" id="nav-lb-menu">
          <a href="/leaderboard">Dojo</a>
          <a href="/arena-leaderboard">Arena</a>
        </div>
      </div>
      <a href="/profile" id="nav-profile">My Profile</a>
      <a href="/journey" id="nav-journey">Trainer Journey</a>
      <span id="nav-user" class="nav-user"></span>
    </nav>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script>
    const _navUser = localStorage.getItem("poke_username");
    if (_navUser) {
      document.getElementById("nav-user").textContent = _navUser;
    }
    function toggleLbMenu() {
      document.getElementById("nav-lb-menu").classList.toggle("hidden");
    }
    document.getElementById("nav-lb-btn").addEventListener("click", e => {
      e.stopPropagation();
      toggleLbMenu();
    });
    document.addEventListener("click", () => {
      document.getElementById("nav-lb-menu")?.classList.add("hidden");
    });
  </script>
  {% block scripts %}{% endblock %}
</body>
</html>
