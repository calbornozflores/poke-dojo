{% extends "base.html" %}
{% block title %}Contact — Poke Dojo{% endblock %}

{% block content %}
<div class="scores-layout" style="max-width:600px">
  <div class="faq-page-header">
    <div class="faq-page-title">
      <h1>Contact Us</h1>
    </div>
    <p class="faq-page-subtitle">Bugs, ideas, or just a hello — all welcome.</p>
  </div>

  <div class="contact-body-card">
    <div class="contact-links">
      <a href="https://github.com/calbornozflores/poke-dojo/issues" target="_blank" class="contact-link">
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/13.png"
             alt="Weedle" class="contact-link-sprite">
        <div>
          <div class="contact-link-title">Report a Bug / Request a Feature</div>
          <div class="contact-link-sub">github.com/calbornozflores/poke-dojo/issues</div>
        </div>
      </a>
      <a href="mailto:c.albornoz.flores@gmail.com" class="contact-link">
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/225.png"
             alt="Delibird" class="contact-link-sprite">
        <div>
          <div class="contact-link-title">Email</div>
          <div class="contact-link-sub">c.albornoz.flores@gmail.com</div>
        </div>
      </a>
    </div>
  </div>
</div>
{% endblock %}
